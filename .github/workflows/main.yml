name: Download desired file using National Internet

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct link to the file you want to download'
        required: true
        type: string

      zip_password:
        description: 'Password for the ZIP archive (leave empty for no password)'
        required: false
        type: string

      archive_name:
        description: 'Name of the archive (without .7z extension)'
        required: false
        default: 'archive'
        type: string

      batch_size:
        description: 'Number of archive parts to push per commit'
        required: false
        default: '10'
        type: string

      folder_name:
        description: 'Name of the folder to store files'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Prepare folder
        run: |
          FOLDER_NAME="${{ github.event.inputs.folder_name }}"
          echo "Creating folder: $FOLDER_NAME"
          mkdir -p "$FOLDER_NAME"

          # Clear existing files in the folder
          echo "Clearing existing files in $FOLDER_NAME..."
          rm -rf "$FOLDER_NAME/*"

      - name: Download file from link
        run: |
          curl -L --fail --retry 3 -o downloaded_file "${{ github.event.inputs.file_url }}"
          ls -lh downloaded_file

      - name: Extract original file name (optional)
        run: |
          ORIGINAL_NAME=$(basename "${{ github.event.inputs.file_url }}" | cut -d '?' -f1)
          [ -z "$ORIGINAL_NAME" ] && ORIGINAL_NAME="downloaded_file"
          echo "ORIGINAL_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV

      - name: Check file size and handle
        run: |
          FILE_SIZE=$(stat -c%s "downloaded_file")
          echo "File size: $FILE_SIZE bytes"

          if [ $FILE_SIZE -lt 95000000 ]; then
            echo "File is under 95 MB, moving directly to $FOLDER_NAME..."
            mv downloaded_file "$FOLDER_NAME/$ORIGINAL_NAME"
          else
            echo "Creating password-protected multi-part archive..."
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}"
            if [ -z "${{ github.event.inputs.zip_password }}" ]; then
              # No password provided
              7z a -mhe=on -mx=3 -v95m "$FOLDER_NAME/${ARCHIVE_NAME}.7z" downloaded_file
            else
              # Password provided
              7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=3 -v95m "$FOLDER_NAME/${ARCHIVE_NAME}.7z" downloaded_file
            fi

            # Delete original file after archiving
            rm -f downloaded_file
          fi

      - name: Commit and push folder contents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add new files in the specified folder
          git add "$FOLDER_NAME/*"
          git commit -m "Add files to $FOLDER_NAME"
          git push
